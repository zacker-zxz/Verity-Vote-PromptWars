steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/voteguide-ai', '.']

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/voteguide-ai']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'voteguide-ai'
      - '--image'
      - 'gcr.io/$PROJECT_ID/voteguide-ai'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},GOOGLE_TRANSLATE_API_KEY=${_GOOGLE_TRANSLATE_API_KEY},NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY},HOSTNAME=0.0.0.0'

substitutions:
  _GEMINI_API_KEY: ''
  _GOOGLE_TRANSLATE_API_KEY: ''
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ''

images:
  - 'gcr.io/$PROJECT_ID/voteguide-ai'
